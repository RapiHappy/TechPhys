<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TechPhys: Neural Guide | AR & AI</title>
    <link rel="stylesheet" href="style.css">
    
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
</head>
<body>
    <div id="webgl-container"></div>

    <div id="hud">
        <div id="status-panel" class="glassmorphism" style="position: absolute; top: 10px; left: 10px; padding: 10px; z-index: 10;">
            <div id="status-text" class="neon-text text-cyan">SYSTEM: INITIALIZING...</div>
            <div id="ar-button-container"></div>
        </div>

        <div id="achievements-panel" class="glassmorphism hidden" style="position: absolute; top: 80px; left: 10px; padding: 10px; z-index: 10;">
            <div id="xp-text" class="text-cyan">Уровень: 1 (0 XP)</div>
            <div id="achv-count" class="text-purple">Разблокировано наград: 0</div>
        </div>

        <div id="mic-container" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;">
            <button id="mic-btn" class="neon-button glow" style="padding: 15px 30px; font-size: 18px; border-radius: 50px;">🎙️ Говорить</button>
        </div>

        <div id="terminal" class="glassmorphism" style="position: absolute; bottom: 10px; right: 10px; width: 300px; height: 150px; padding: 10px; overflow-y: auto; background: rgba(0,0,0,0.8); z-index: 10;">
            <div class="terminal-header text-purple" style="font-weight: bold; border-bottom: 1px solid purple; margin-bottom: 5px;">/// SYSTEM LOG</div>
            <div id="terminal-content" style="font-family: monospace; font-size: 12px; color: cyan;"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
