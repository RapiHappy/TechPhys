<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TechPhys: Neural AR</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Import Maps для Three.js и Cannon-es -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
      }
    }
    </script>
    <link rel="stylesheet" href="../../shared/loader.css">
</head>
<body class="bg-black text-cyan-400 overflow-hidden font-mono antialiased">
    <!-- PREMIUM PRELOADER -->
    <div id="preloader" class="ar-loader">
        <canvas id="arCanvas"></canvas>
        <div class="loader-overlay">
            <h1 class="loader-logo">TECHPHYS <span class="accent">AR</span></h1>
            <div class="loader-status">
                Инициализация AR-пространства<span class="dots">...</span>
            </div>
        </div>
    </div>
    <!-- UI Overlay container (z-index над canvas) -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 z-10 w-full h-full">
        
        <!-- Header -->
        <header class="flex justify-between items-start">
            <div class="glass-panel p-3 border-l-4 border-cyan-400 flex items-center gap-4">
                <a href="../../index.html" class="pointer-events-auto hover:scale-110 transition-transform">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-cyan-400"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </a>
                <div>
                    <h1 class="text-xl font-bold tracking-widest text-shadow-cyan">TECHPHYS // NEURAL AR</h1>
                    <p class="text-xs text-cyan-200/70" id="status-text">SYSTEM: INITIALIZING WebXR / WebGL CORE</p>
                </div>
            </div>
            
            <button id="mic-btn" class="glass-panel p-4 rounded-full border border-pink-500/30 hover:border-pink-500 pointer-events-auto transition-all transition-transform hover:scale-105 active:scale-95 group">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF00FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:drop-shadow-[0_0_8px_rgba(255,0,255,0.8)]">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
        </header>

        <!-- Центральный прицел HUD -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center opacity-40">
            <div class="w-[50vw] h-[50vw] max-w-[300px] max-h-[300px] border border-cyan-500/30 rounded-full animate-[spin_20s_linear_infinite]"></div>
            <div class="absolute w-[20px] h-[2px] bg-cyan-400 shadow-[0_0_10px_#00FFFF]"></div>
            <div class="absolute h-[20px] w-[2px] bg-cyan-400 shadow-[0_0_10px_#00FFFF]"></div>
        </div>

        <!-- Терминал логов -->
        <div class="glass-panel w-full sm:w-[400px] h-[150px] p-3 text-sm overflow-hidden flex flex-col justify-end relative mt-auto">
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-cyan-500 to-transparent"></div>
            <div id="terminal-content" class="flex flex-col gap-1 overflow-y-auto max-h-full pb-1 pr-1 custom-scroll pointer-events-auto">
                <div class="text-pink-500">>> VOICE_RECOGNITION STANDBY...</div>
                <div class="text-cyan-300">>> Ожидание команд. Скажите "Создай шар массой 5", "Очистить".</div>
            </div>
        </div>
        
        <!-- Контейнер для ARButton Three.js -->
        <div id="ar-button-container" class="absolute bottom-4 right-4 pointer-events-auto z-20"></div>
    </div>

    <!-- Основной скрипт -->
    <script type="module" src="app.js"></script>
</body>
</html>
